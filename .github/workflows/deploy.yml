name: Run Paramiko Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install paramiko

    # We deleted the messy file creation step!
    
    - name: Execute Deployment
      env:
        # Pass the secret straight into Python memory
        B64_KEY: ${{ secrets.EC2_SSH_KEY }}
      run: python deploy_to_ec2.py
